{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlotBooker - Premium</title>
    
    <link rel="stylesheet" href="{% static 'booking/style.css' %}?v=darkmode">
</head>
<body>
    <nav class="navbar">
        <h1>📅 SlotBooker</h1>
        <div class="nav-links">
            <a href="{% url 'home' %}">Find a Slot</a>
            <a href="{% url 'my_bookings' %}">My Bookings</a>
        </div>
    </nav>

    <main class="container">
        {% if messages %}
            {% for message in messages %}
                <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #34d399; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>
</body>
</html>
